<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBETT MARKET | Checkout System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --accent: #f43f5e;
            --dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--dark);
            color: white;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
            padding: 20px;
        }

        .container { max-width: 600px; margin: 40px auto; }

        /* --- UI Components --- */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .header p { color: #94a3b8; font-size: 14px; }

        .method-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        
        .method-item {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .method-item.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            transform: scale(1.05);
        }

        .method-item img { width: 40px; margin-bottom: 8px; filter: grayscale(1); transition: 0.3s; }
        .method-item.active img { filter: grayscale(0); }
        .method-item span { display: block; font-size: 12px; font-weight: 700; }

        /* --- Form --- */
        .qris-display {
            display: none;
            background: white;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .qris-display img { width: 100%; max-width: 250px; border-radius: 10px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #94a3b8; font-weight: 600; }
        
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 15px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .btn-submit {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover { background: #4f46e5; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        /* Animation class */
        .reveal { opacity: 0; transform: translateY(20px); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header reveal">
            <h1>Obett Payment</h1>
            <p>Selesaikan pembayaran untuk memproses pesanan Anda</p>
        </div>

        <div class="glass-card reveal">
            <label style="display: block; margin-bottom: 15px; font-size: 14px; font-weight: 700;">Pilih Metode Transfer:</label>
            <div class="method-grid">
                <div class="method-item" onclick="selectMethod('DANA', this)">
                    <span>💙 DANA</span>
                </div>
                <div class="method-item" onclick="selectMethod('GOPAY', this)">
                    <span>💚 GOPAY</span>
                </div>
                <div class="method-item" onclick="selectMethod('QRIS', this)">
                    <span>📸 QRIS</span>
                </div>
            </div>

            <div id="qrisSection" class="qris-display">
                <p style="color: #333; font-size: 12px; margin-bottom: 10px; font-weight: 800;">SCAN QRIS DIBAWAH INI</p>
                <img src="qris.jpeg" alt="QRIS Obett Market">
            </div>

            <div id="paymentDetails" style="display: none; margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 15px; font-size: 14px;">
                <p id="accountInfo"></p>
            </div>

            <form id="paymentForm">
                <div class="form-group">
                    <label>Nama Pengirim / Atas Nama</label>
                    <input type="text" id="senderName" placeholder="Masukkan nama sesuai akun bank/e-wallet" required>
                </div>

                <div class="form-group">
                    <label>Upload Bukti Pembayaran (Screenshot)</label>
                    <input type="file" id="proofFile" accept="image/*" required>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Kirim Konfirmasi</button>
            </form>
        </div>
    </div>

    <script>
        // Konfigurasi Telegram
        const TELEGRAM_BOT_TOKEN = '8608483953:AAGFXjPTREA5XYL04SkIiorkXYQCWIgFDtg'; // Ganti dengan token bot anda
        const TELEGRAM_CHAT_ID = '7702317181';     // Ganti dengan chat id anda

        let selectedMethod = "";

        // Animasi Awal
        window.addEventListener('load', () => {
            gsap.to(".reveal", { opacity: 1, y: 0, duration: 1, stagger: 0.3, ease: "power4.out" });
        });

        function selectMethod(method, element) {
            selectedMethod = method;
            
            // UI Update
            document.querySelectorAll('.method-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const qrisSection = document.getElementById('qrisSection');
            const details = document.getElementById('paymentDetails');
            const info = document.getElementById('accountInfo');

            if (method === 'QRIS') {
                gsap.to(qrisSection, { display: 'block', opacity: 1, duration: 0.5 });
                details.style.display = 'none';
            } else {
                qrisSection.style.display = 'none';
                details.style.display = 'block';
                info.innerHTML = method === 'DANA' ? 
                    '<b>Transfer ke DANA:</b><br>Nomor: 089637919085<br>A/N: OBETT MARKET' : 
                    '<b>Transfer ke GOPAY:</b><br>Nomor: 089637919085<br>A/N: OBETT MARKET';
                gsap.from(details, { y: 10, opacity: 0 });
            }
        }

        // Handle Submit ke Telegram
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!selectedMethod) return alert("Pilih metode pembayaran terlebih dahulu!");

            const btn = document.getElementById('submitBtn');
            const senderName = document.getElementById('senderName').value;
            const photoFile = document.getElementById('proofFile').files[0];

            btn.innerText = "Mengirim...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('chat_id', TELEGRAM_CHAT_ID);
            formData.append('photo', photoFile);
            formData.append('caption', `🔔 *NOTIFIKASI PEMBAYARAN BARU*\n\n👤 Nama: ${senderName}\n💳 Metode: ${selectedMethod}\n🕒 Waktu: ${new Date().toLocaleString()}`);
            formData.append('parse_mode', 'Markdown');

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert("Bukti pembayaran berhasil dikirim! Silakan tunggu konfirmasi admin.");
                    location.reload();
                } else {
                    throw new Error("Gagal mengirim ke Telegram");
                }
            } catch (err) {
                alert("Terjadi kesalahan: " + err.message);
                btn.innerText = "Kirim Konfirmasi";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
